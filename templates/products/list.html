{% extends "base.html" %}

{% block title %}Products - Smart Retail System{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <div>
        <h1 class="page-title">Products Management</h1>
        <p class="text-muted">Manage your product catalog</p>
    </div>
    <button class="btn btn-primary btn-lg" onclick="location.href='/products/new'">
        <i class="fas fa-plus me-2"></i>Add Product
    </button>
</div>

<!-- Search & Filter -->
<div class="card mb-4">
    <div class="card-body">
        <div class="row g-3 align-items-end">
            <div class="col-md-5">
                <label class="form-label">Search Products</label>
                <input type="text" id="search-input" class="form-control" placeholder="Search by name or SKU...">
            </div>
            <div class="col-md-3">
                <label class="form-label">Category</label>
                <select id="category-filter" class="form-select">
                    <option value="">All Categories</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="searchProducts()">
                    <i class="fas fa-search me-2"></i>Search
                </button>
            </div>
            <div class="col-md-2">
                <a href="{{ url_for('bulk_import') }}" class="btn btn-success w-100">
                    <i class="fas fa-file-upload me-2"></i>Bulk Import
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Products Table -->
<div class="card">
    <div class="table-responsive">
        <table class="table" id="products-table">
            <thead>
                <tr>
                    <th style="width: 15%">SKU</th>
                    <th style="width: 25%">Product Name</th>
                    <th style="width: 15%">Category</th>
                    <th style="width: 12%">Cost Price</th>
                    <th style="width: 12%">Selling Price</th>
                    <th style="width: 10%">Margin</th>
                    <th style="width: 11%">Actions</th>
                </tr>
            </thead>
            <tbody id="products-tbody">
                <tr><td colspan="7" class="text-center text-muted py-4">Loading products...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="card-footer">
        <div id="pagination" class="d-flex justify-content-between align-items-center">
            <small class="text-muted" id="product-count">Total: 0</small>
            <nav id="page-nav"></nav>
        </div>
    </div>
</div>

<script>
    let currentPage = 1;
    const itemsPerPage = 20;
    
    async function loadProducts(page = 1, search = '', category = '') {
        let url = `/api/v1/products?page=${page}&limit=${itemsPerPage}`;
        if (category) url += `&category=${encodeURIComponent(category)}`;
        
        const response = await fetch(url);
        const result = await response.json();
        
        renderProducts(result.data);
        renderPagination(result.pagination);
        
        if (search) {
            filterProductsLocally(search);
        }
    }
    
    function renderProducts(products) {
        const tbody = document.getElementById('products-tbody');
        
        if (products.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No products found</td></tr>';
            return;
        }
        
        let html = '';
        products.forEach(p => {
            const marginClass = p.margin_percent < 20 ? 'text-warning' : '';
            html += `
                <tr class="${p.margin_percent < 10 ? 'low-stock' : ''}">
                    <td><span class="badge-sku">${p.sku}</span></td>
                    <td>
                        <strong>${p.name}</strong>
                        ${p.description ? `<br><small class="text-muted">${p.description.substring(0, 50)}</small>` : ''}
                    </td>
                    <td><span class="badge-category">${p.category}</span></td>
                    <td class="price-cost">TZS ${Math.round(p.cost_price_tzs).toLocaleString()}</td>
                    <td class="price-selling">TZS ${Math.round(p.selling_price_tzs).toLocaleString()}</td>
                    <td>
                        <strong class="${marginClass}">${p.margin_percent.toFixed(1)}%</strong>
                    </td>
                    <td>
                        <a href="/products/${p.product_id}/edit" class="btn btn-sm btn-outline-primary">Edit</a>
                        <button onclick="deleteProduct(${p.product_id})" class="btn btn-sm btn-outline-danger">Delete</button>
                    </td>
                </tr>
            `;
        });
        
        tbody.innerHTML = html;
    }
    
    function renderPagination(pagination) {
        document.getElementById('product-count').textContent = 
            `Total: ${pagination.total} products (Page ${pagination.page}/${pagination.total_pages})`;
        
        let navHtml = '';
        if (pagination.page > 1) {
            navHtml += `<button class="btn btn-sm btn-outline-primary" onclick="currentPage=${pagination.page - 1}; loadProducts(${pagination.page - 1})">← Previous</button>`;
        }
        if (pagination.page < pagination.total_pages) {
            navHtml += `<button class="btn btn-sm btn-outline-primary ms-2" onclick="currentPage=${pagination.page + 1}; loadProducts(${pagination.page + 1})">Next →</button>`;
        }
        
        document.getElementById('page-nav').innerHTML = navHtml;
    }
    
    function filterProductsLocally(search) {
        const rows = document.querySelectorAll('#products-tbody tr');
        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(search.toLowerCase()) ? '' : 'none';
        });
    }
    
    async function searchProducts() {
        const search = document.getElementById('search-input').value;
        const category = document.getElementById('category-filter').value;
        
        if (search.length < 2) {
            loadProducts(1, '', category);
            return;
        }
        
        const response = await fetch(`/api/v1/products/search?q=${encodeURIComponent(search)}`);
        const result = await response.json();
        
        if (result.status === 'success') {
            renderProducts(result.data);
        }
    }
    
    async function loadCategories() {
        const response = await fetch('/api/v1/categories');
        const result = await response.json();
        
        const select = document.getElementById('category-filter');
        result.data.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            select.appendChild(option);
        });
    }
    
    function deleteProduct(productId) {
        if (confirm('Are you sure you want to archive this product?')) {
            fetch(`/api/v1/products/${productId}`, { method: 'DELETE' })
                .then(r => r.json())
                .then(data => {
                    alert(data.message);
                    loadProducts(currentPage);
                });
        }
    }
    
    // Event listeners
    document.getElementById('search-input').addEventListener('keypress', e => {
        if (e.key === 'Enter') searchProducts();
    });
    
    document.getElementById('category-filter').addEventListener('change', () => {
        currentPage = 1;
        loadProducts(1, '', document.getElementById('category-filter').value);
    });
    
    // Load on page load
    loadCategories();
    loadProducts();
</script>
{% endblock %}
